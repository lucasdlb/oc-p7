name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff fix + check)
        run: |
          uv run ruff check . --fix
          uv run ruff check .

      - name: Type check
        run: uv run ty check --exclude config.py --exclude tests/integration

      - name: Tests
        run: uv run pytest -q --ignore=tests/integration
