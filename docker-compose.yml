services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./vector_store:/app/vector_store
      - ./data:/app/data

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "7860:7860"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
